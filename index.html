    function initFirebase() { app = firebase.initializeApp(firebaseConfig); db = firebase.database(); }
    function generateRoomCode() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      let code = ""; for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)]; return code;
    }

    function showHome() {
      document.getElementById("app").innerHTML = `
        <h2>READY TO GO REMOTE?</h2>
        <button onclick="createRoom()">CREATE ROOM (Host)</button>
        <button onclick="showJoinScreen()">JOIN ROOM (Friend)</button>
        <p class="flavor-text">V1.21 — We had to rewrite this game so many times the code started developing trust issues 😂</p>
      `;
    }

    async function createRoom() {
      initFirebase();
      currentRoomCode = generateRoomCode();
      roomRef = db.ref('rooms/' + currentRoomCode);
      mySlot = 1;
      roomRef.set({ players: {1:{slot:1,connected:true},2:{slot:2,connected:false}}, turn:1, char1:characters[Math.floor(Math.random()*characters.length)], char2:characters[Math.floor(Math.random()*characters.length)], guesses:[] });
      roomRef.on('value', snapshot => handleRoomUpdate(snapshot.val()));
      showWaitingScreen();
    }

    function showJoinScreen() {
      document.getElementById("app").innerHTML = `
        <h2>ENTER ROOM CODE</h2>
        <input id="codeInput" placeholder="e.g. X7K9P2" maxlength="6" style="text-transform:uppercase">
        <button onclick="joinRoom()">JOIN &amp; BATTLE</button>
        <button onclick="showHome()">← BACK</button>
        <p class="flavor-text">V1.21 — We had to rewrite this game so many times the code started developing trust issues 😂</p>
      `;
    }

    async function joinRoom() {
      const code = document.getElementById("codeInput").value.trim().toUpperCase();
      if (!code) return;
      initFirebase();
      currentRoomCode = code;
      roomRef = db.ref('rooms/' + code);
      mySlot = 2;
      const snap = await roomRef.once('value');
      if (!snap.exists()) { alert("Room not found!"); return; }
      roomRef.child('players/2').update({connected:true});
      roomRef.on('value', snapshot => handleRoomUpdate(snapshot.val()));
    }

    function handleRoomUpdate(data) {
      if (!data) return;
      currentTurn = data.turn || 1;
      myChar = mySlot === 1 ? data.char1 : data.char2;
      opponentChar = mySlot === 1 ? data.char2 : data.char1;

      if (!data.players || !data.players[mySlot] || !data.players[mySlot].connected) {
        showWaitingScreen();
        return;
      }
      if (!document.getElementById("gameUI")) renderGameUI();
      const isMyTurn = currentTurn === mySlot;
      document.getElementById("turnTitle").innerHTML = isMyTurn 
        ? `YOUR TURN — Ask your ONE question!<br><span style="color:#ffff00">Friend is looking at YOUR forehead</span>` 
        : `WAITING FOR FRIEND — They are guessing<br><span style="color:#00ffff">Your forehead is hidden from you</span>`;
      updateOpponentImage();
    }

    function renderGameUI() {
      document.getElementById("app").innerHTML = `
        <div class="status">ROOM: <span style="color:#ffff00">${currentRoomCode}</span> • Share on Discord!</div>
        <div style="margin-bottom:20px;"><h3 id="turnTitle" style="margin-bottom:15px;">WAITING...</h3></div>
        <div class="forehead-row">
          <div>
            <div class="label">YOUR FOREHEAD</div>
            <div class="character-display">
              <div class="hidden-overlay">
                <div style="font-size:5rem;margin-bottom:10px;">❓</div>
                HIDDEN
              </div>
            </div>
          </div>
          <div>
            <div class="label">FRIEND'S FOREHEAD</div>
            <div class="character-display" id="opponentChar"></div>
            <button class="wiki-btn" onclick="openWiki()">📖 Wiki Page</button>
          </div>
        </div>
        <p>Ask your ONE question out loud → they answer via voice → then guess:</p>
        <input type="text" id="guessInput" placeholder="TYPE YOUR GUESS" onkeypress="if(event.key==='Enter') makeGuess()">
        <button onclick="makeGuess()">LOCK IN GUESS 🔥</button>
        <button onclick="dontKnow()">I DON'T KNOW WHO THE HELL THIS IS</button>
        <button onclick="skipTurn()">Skip Turn (wrong guess)</button>
        <div class="log" id="log"></div>
        <p class="flavor-text">V1.21 — We had to rewrite this game so many times the code started developing trust issues 😂</p>
      `;
      updateOpponentImage();
    }

    function updateOpponentImage() {
      const display = document.getElementById("opponentChar");
      if (!display || !opponentChar) return;
      display.innerHTML = `<img src="${opponentChar.img}" alt="${opponentChar.name}">`;
    }

    function openWiki() {
      if (opponentChar && opponentChar.wiki) {
        window.open(opponentChar.wiki, '_blank');
      } else {
        alert("No wiki link for this character yet!");
      }
    }

    function makeGuess() {
      const guess = document.getElementById("guessInput").value.trim();
      if (!guess) return;
      const correct = myChar.name.toLowerCase();
      if (guess.toLowerCase() === correct) {
        document.getElementById("app").innerHTML = `
          <h1 class="winner">🎉 YOU GOT IT! 🎉</h1>
          <p><strong>${myChar.name}</strong> was on YOUR forehead!</p>
          <div class="character-display" style="width:280px;height:280px;margin:20px auto;">
            <img src="${myChar.img}" alt="${myChar.name}">
          </div>
          <button onclick="newRound()">NEW ROUND IN SAME ROOM</button>
          <p class="flavor-text">V1.21 — We had to rewrite this game so many times the code started developing trust issues 😂</p>
        `;
      } else {
        const log = document.getElementById("log");
        log.innerHTML += `<p style="color:#ff00ff;">❌ WRONG — You said: ${guess}</p>`;
        document.getElementById("guessInput").value = "";
        skipTurn();
      }
    }

    function dontKnow() {
      if (confirm("Reset the round with new characters?")) {
        newRound();
      }
    }

    function skipTurn() {
      const newTurn = currentTurn === 1 ? 2 : 1;
      roomRef.update({turn: newTurn});
    }

    function newRound() {
      const shuffled = [...characters].sort(() => Math.random() - 0.5);
      roomRef.update({ char1: shuffled[0], char2: shuffled[1], turn: 1, guesses: [] });
    }

    function showWaitingScreen() {
      document.getElementById("app").innerHTML = `
        <h2>ROOM CODE: <span style="color:#ffff00;font-size:3rem">${currentRoomCode || 'LOADING...'}</span></h2>
        <p>Share this code with your friend on Discord!</p>
        <div style="margin:40px 0;font-size:1.4rem;color:#00ffff;">Waiting for opponent to join...</div>
        <button onclick="showHome()">CANCEL &amp; BACK</button>
        <p class="flavor-text">V1.21 — We had to rewrite this game so many times the code started developing trust issues 😂</p>
      `;
    }

    window.onload = showHome;
  </script>
</body>
</html>
